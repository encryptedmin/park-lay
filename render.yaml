databases:
  - name: park-lay-db
    plan: free
    databaseName: park_lay
    user: park_lay

services:
  - type: web
    name: park-lay
    runtime: python
    plan: free
    region: singapore
    buildCommand: bash build.sh
    startCommand: bash start.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: park-lay-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: WEB_CONCURRENCY
        value: "2"
