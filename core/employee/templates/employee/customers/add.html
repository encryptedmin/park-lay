{% extends 'employee/layouts/base.html' %}

{% block title %}Add Customer{% endblock %}

{% block page_title %}
Add Customer
{% endblock %}

{% block content %}

<div class="dashboard-panel">

    <form method="POST">

        {% csrf_token %}

        <div class="form-grid">

            {% for field in form %}
            <div class="form-group">

                <label>
                    {{ field.label }}
                </label>

                {{ field }}

                {{ field.errors }}

            </div>
            {% endfor %}

        </div>

        <button
            type="submit"
            class="primary-button"
        >
            Save Customer
        </button>

    </form>

</div>

{% endblock %}
