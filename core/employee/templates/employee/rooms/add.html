{% extends 'employee/layouts/base.html' %}

{% block title %}Add Room{% endblock %}

{% block page_title %}
Add Room
{% endblock %}

{% block content %}

<div class="dashboard-panel">

    <form
        method="POST"
        enctype="multipart/form-data"
    >

        {% csrf_token %}

        <div class="form-grid">

            {% for field in form %}
            <div class="form-group">

                <label>
                    {{ field.label }}
                </label>

                {{ field }}

                {{ field.errors }}

            </div>
            {% endfor %}

        </div>

        <button
            type="submit"
            class="primary-button"
        >
            Save Room
        </button>

    </form>

</div>

{% endblock %}
