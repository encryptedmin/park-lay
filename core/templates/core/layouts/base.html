{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}
        Park-Lay Suites
        {% endblock %}
    </title>

    <link rel="icon" type="image/png" href="{% static 'images/branding/logo.png' %}">

    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>

<body>

    {% include 'core/partials/navbar.html' %}
    {% include 'core/partials/alerts.html' %}

    {% block content %}
    {% endblock %}

    <script src="{% static 'js/navbar.js' %}"></script>
    <script src="{% static 'js/alerts.js' %}"></script>
    <script src="{% static 'js/confirmations.js' %}"></script>

</body>
</html>
