<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Payment Information | Park-Lay Suites
    </title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f1f5f9;
            color: #0f172a;
        }

        .page-wrapper {
            min-height: 100vh;
            padding: 40px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .top-bar h1 {
            font-size: 40px;
        }

        .top-bar p {
            margin-top: 8px;
            color: #64748b;
        }

        .dashboard-btn {
            padding: 12px 20px;
            border-radius: 10px;
            background: #0f172a;
            color: white;
            text-decoration: none;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .dashboard-btn:hover {
            background: #1e293b;
            transform: translateY(-2px);
        }

        .add-btn {
            background: #16a34a;
        }

        .add-btn:hover {
            background: #15803d;
        }

        .accounts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
        }

        .account-card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
        }

        .qr-image {
            width: 100%;
            height: 280px;
            object-fit: contain;
            border-radius: 16px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
        }

        .account-name {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .account-number {
            color: #475569;
            margin-bottom: 20px;
        }

        .action-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .edit-btn {
            background: #2563eb;
        }

        .edit-btn:hover {
            background: #1d4ed8;
        }

        .delete-btn {
            background: #dc2626;
        }

        .delete-btn:hover {
            background: #b91c1c;
        }

        .empty-state {
            background: white;
            padding: 50px;
            border-radius: 24px;
            text-align: center;
            color: #64748b;
        }

        @media (max-width: 768px) {

            .page-wrapper {
                padding: 20px;
            }

            .top-bar h1 {
                font-size: 30px;
            }

        }

    </style>

</head>

<body>

<section class="page-wrapper">

    <div class="top-bar">

        <div>

            <h1>
                Payment Information
            </h1>

            <p>
                Manage GCash payment accounts and QR codes.
            </p>

        </div>

        <div
            style="
                display: flex;
                gap: 12px;
                flex-wrap: wrap;
            "
        >

            <a
                href="{% url 'employee_dashboard' %}"
                class="dashboard-btn"
            >
                Dashboard
            </a>

            <a
                href="{% url 'add_gcash_account' %}"
                class="dashboard-btn add-btn"
            >
                Add Payment Account
            </a>

        </div>

    </div>

    {% if accounts %}

    <div class="accounts-grid">

        {% for account in accounts %}

        <div class="account-card">

            <img
                src="{{ account.qr_code.url }}"
                alt="QR Code"
                class="qr-image"
            >

            <div class="account-name">
                {{ account.account_name }}
            </div>

            <div class="account-number">
                {{ account.account_number }}
            </div>

            <div class="action-group">

                <a
                    href="{% url 'edit_gcash_account' account.id %}"
                    class="dashboard-btn edit-btn"
                >
                    Edit
                </a>

                <form
                    method="POST"
                    action="{% url 'delete_gcash_account' account.id %}"
                    onsubmit="
                        return confirm(
                            'Delete this payment account?'
                        );
                    "
                >

                    {% csrf_token %}

                    <button
                        type="submit"
                        class="dashboard-btn delete-btn"
                    >
                        Delete
                    </button>

                </form>

            </div>

        </div>

        {% endfor %}

    </div>

    {% else %}

    <div class="empty-state">

        No payment accounts added yet.

    </div>

    {% endif %}

</section>

</body>

</html>
